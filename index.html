<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doruk Stars | Proje X</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        
        /* Brawl Stars Tarzı Üst Panel */
        #top-bar {
            position: absolute; top: 0; width: 100%; height: 50px;
            background: rgba(0,0,0,0.6); display: flex; align-items: center;
            justify-content: space-between; z-index: 10; color: white; padding: 0 10px;
            box-sizing: border-box; border-bottom: 3px solid #f39c12;
        }
        .stat-box { background: #2c3e50; padding: 5px 15px; border-radius: 20px; border: 2px solid #ecf0f1; font-size: 14px; }
        .gold { color: #f1c40f; } .gem { color: #2ecc71; } .trophy { color: #e67e22; }

        /* Oyun Alanı Konteynırı */
        #game-container { display: flex; justify-content: center; align-items: center; height: 100vh; }

        /* Alt Menü (Dükkan, Savaşçılar) */
        #bottom-menu {
            position: absolute; bottom: 10px; width: 90%; display: flex;
            justify-content: space-around; z-index: 10;
        }
        .menu-btn {
            background: #e74c3c; color: white; padding: 10px 20px;
            border-radius: 10px; border: 3px solid #c0392b; cursor: pointer;
            text-transform: uppercase; font-size: 12px; transition: 0.2s;
        }
        .menu-btn:hover { transform: scale(1.1); background: #ff5e4d; }
        .play-btn { background: #f1c40f; color: #000; font-size: 20px; padding: 15px 40px; border: 4px solid #d35400; }
    </style>
</head>
<body>

    <div id="top-bar">
        <div class="stat-box trophy">🏆 36757</div>
        <div style="font-size: 18px; letter-spacing: 2px;">SK | DSFXTR</div>
        <div style="display:flex; gap:10px;">
            <div class="stat-box gold">🟡 14389</div>
            <div class="stat-box gem">💎 116</div>
        </div>
    </div>

    <div id="game-container"></div>

    <div id="bottom-menu">
        <div class="menu-btn">Dükkan</div>
        <div class="menu-btn">Savaşçılar (99/100)</div>
        <div class="menu-btn play-btn" onclick="alert('Savaş Başlıyor!')">OYNA</div>
        <div class="menu-btn">Arkadaş (49)</div>
        <div class="menu-btn">Kulüp</div>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 1000,
            height: 600,
            parent: 'game-container',
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player, cursors, bullets, enemies, bushes, joystick;

        function preload() {
            // Fotoğraflardaki Showdown (Hesaplaşma) atmosferi için varlıklar
            this.load.image('bg', 'https://labs.phaser.io/assets/skies/space3.png'); // Zemin
            this.load.image('bush', 'https://labs.phaser.io/assets/sprites/phaser-dude.png'); // Çalı temsili
            this.load.image('hero', 'https://labs.phaser.io/assets/sprites/asmos.png'); // Karakter (Doruk)
            this.load.image('enemy', 'https://labs.phaser.io/assets/sprites/shmup-ship.png'); // Rakip
            this.load.image('bullet', 'https://labs.phaser.io/assets/sprites/bullets/bullet6.png');
        }

        function create() {
            // 1. ZEMİN VE ÇALILAR
            this.add.tileSprite(500, 300, 2000, 2000, 'bg').setAlpha(0.3);
            
            bushes = this.physics.add.staticGroup();
            for(let i=0; i<10; i++) {
                let bx = Phaser.Math.Between(100, 900);
                let by = Phaser.Math.Between(100, 500);
                let b = bushes.create(bx, by, 'bush').setScale(1.5).setTint(0x27ae60);
            }

            // 2. OYUNCU (Fotoğraftaki gibi yeşil halkalı)
            player = this.physics.add.sprite(500, 300, 'hero');
            player.setCollideWorldBounds(true);
            player.setCircle(20);
            
            // Altındaki Yeşil Halka
            let circle = this.add.graphics();
            circle.lineStyle(3, 0x2ecc71, 1);
            circle.strokeCircle(0, 0, 30);
            this.playerRing = circle;

            // 3. RAKİPLER
            enemies = this.physics.add.group();
            for(let i=0; i<4; i++) {
                let ex = Phaser.Math.Between(100, 900);
                let ey = Phaser.Math.Between(100, 500);
                let e = enemies.create(ex, ey, 'enemy').setTint(0xe74c3c);
                e.hp = 4000;
            }

            // 4. SİSTEMLER
            bullets = this.physics.add.group();
            cursors = this.input.keyboard.createCursorKeys();
            
            // Ateş Etme (Tıklanan yere)
            this.input.on('pointerdown', (pointer) => {
                let bullet = bullets.create(player.x, player.y, 'bullet');
                this.physics.moveToObject(bullet, pointer, 500);
            });

            // Çalıya girme kontrolü
            this.physics.add.overlap(player, bushes, () => {
                player.setAlpha(0.5); // Çalıda gizlenme efekti
            });

            // Mermi düşmana değerse
            this.physics.add.overlap(bullets, enemies, (b, e) => {
                b.destroy();
                e.setTint(0xffffff);
                this.time.delayedCall(100, () => e.setTint(0xe74c3c));
                this.cameras.main.shake(50, 0.005);
            });
        }

        function update() {
            player.setVelocity(0);
            
            // Hareket Mantığı
            if (cursors.left.isDown) player.setVelocityX(-250);
            else if (cursors.right.isDown) player.setVelocityX(250);
            if (cursors.up.isDown) player.setVelocityY(-250);
            else if (cursors.down.isDown) player.setVelocityY(250);

            // Yeşil halkayı oyuncuyla taşı
            this.playerRing.x = player.x;
            this.playerRing.y = player.y;

            // Çalıdan çıkınca görünür ol
            if (!this.physics.overlap(player, bushes)) {
                player.setAlpha(1);
            }
        }
    </script>
</body>
</html>
