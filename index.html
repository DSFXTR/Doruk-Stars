<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doruk Stars | Pro Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #0b0d17; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* ÜST PANEL */
        #top-bar {
            position: absolute; top: 0; width: 100%; height: 60px;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            display: flex; align-items: center; justify-content: space-between;
            z-index: 100; color: white; padding: 0 20px; box-sizing: border-box;
        }
        .stat { background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; border: 2px solid #f39c12; font-weight: bold; }

        /* ANA MENÜ BUTONLARI */
        #ui-container {
            position: absolute; bottom: 20px; width: 100%; display: flex;
            justify-content: center; gap: 10px; z-index: 100;
        }
        .btn {
            background: #e74c3c; color: white; padding: 12px 20px;
            border-radius: 10px; border: 4px solid #c0392b; cursor: pointer;
            font-weight: bold; text-transform: uppercase; transition: 0.1s;
        }
        .btn:active { transform: scale(0.9); }
        .play-btn { background: #f1c40f; border-color: #d35400; color: black; font-size: 24px; padding: 15px 60px; }

        /* OVERLAY MENÜLER (Dükkan & Savaşçılar) */
        .overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 80%; height: 70%; background: #1a1c2c; border: 5px solid #f39c12;
            z-index: 200; border-radius: 20px; color: white; padding: 20px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); overflow-y: auto;
        }
        .overlay.active { transform: translate(-50%, -50%) scale(1); }
        .close-btn { position: absolute; right: 10px; top: 10px; background: red; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; }

        /* MENÜ İÇERİKLERİ */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #2c3e50; border-radius: 10px; padding: 10px; text-align: center; border-bottom: 5px solid #000; }
        .card img { width: 100%; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="top-bar">
        <div class="stat" style="color:#e67e22">🏆 36757</div>
        <div style="font-size: 22px; text-shadow: 2px 2px #000;">SK | DSFXTR</div>
        <div style="display:flex; gap:10px;">
            <div class="stat" style="color:#f1c40f">🟡 14389</div>
            <div class="stat" style="color:#2ecc71">💎 116</div>
        </div>
    </div>

    <div id="game-container"></div>

    <div id="ui-container">
        <div class="btn" onclick="openMenu('shop')">Dükkan</div>
        <div class="btn" onclick="openMenu('brawlers')">Savaşçılar</div>
        <div class="btn play-btn" onclick="startGame()">OYNA</div>
        <div class="btn">Kulüp</div>
    </div>

    <div id="shop" class="overlay">
        <button class="close-btn" onclick="closeMenu('shop')">X</button>
        <h2>DÜKKAN - ÖZEL TEKLİFLER</h2>
        <div class="grid">
            <div class="card"><h3>PSG Shelly</h3><p>💎 69</p></div>
            <div class="card"><h3>Böcek Carl</h3><p>💎 104</p></div>
            <div class="card"><h3>Ücretsiz</h3><p>🎁 Al</p></div>
        </div>
    </div>

    <div id="brawlers" class="overlay">
        <button class="close-btn" onclick="closeMenu('brawlers')">X</button>
        <h2>SAVAŞÇILAR (99/100)</h2>
        <div class="grid">
            <div class="card" style="background: #fbff00; color: black;"><h3>KENJI</h3><p>GÜÇ 11</p></div>
            <div class="card" style="background: #e74c3c;"><h3>MORTIS</h3><p>GÜÇ 11</p></div>
            <div class="card" style="background: #3498db;"><h3>COLT</h3><p>GÜÇ 11</p></div>
            <div class="card" style="background: #9b59b6;"><h3>EDGAR</h3><p>GÜÇ 11</p></div>
        </div>
    </div>

    <script>
        // MENÜ KONTROLLERİ
        function openMenu(id) { document.getElementById(id).classList.add('active'); }
        function closeMenu(id) { document.getElementById(id).classList.remove('active'); }
        function startGame() { alert("Savaş Alanına Giriliyor..."); }

        // OYUN MOTORU (PHASER)
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            parent: 'game-container',
            physics: { default: 'arcade' },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player, bushes, cursors;

        function preload() {
            // Arkaplan ve Karakterler
            this.load.image('ground', 'https://labs.phaser.io/assets/tests/cols/green-tile.png');
            this.load.image('hero', 'https://labs.phaser.io/assets/sprites/asmos.png');
            this.load.image('bush', 'https://labs.phaser.io/assets/sprites/block.png');
        }

        function create() {
            // Gerçek Showdown Zemini
            this.add.tileSprite(0, 0, 4000, 4000, 'ground').setOrigin(0).setTint(0x1e5d2f);

            // Çalılar (Gruplandırılmış)
            bushes = this.physics.add.staticGroup();
            for(let i=0; i<30; i++) {
                bushes.create(Phaser.Math.Between(100, 1500), Phaser.Math.Between(100, 1500), 'bush').setScale(2).setTint(0x0d3b1a).setAlpha(0.8);
            }

            // Karakter (Yeşil Halkalı)
            player = this.physics.add.sprite(window.innerWidth/2, window.innerHeight/2, 'hero');
            player.setCollideWorldBounds(true);
            
            let ring = this.add.graphics();
            ring.lineStyle(4, 0x2ecc71, 0.8);
            ring.strokeCircle(0, 0, 35);
            this.ring = ring;

            cursors = this.input.keyboard.createCursorKeys();
            this.cameras.main.startFollow(player);
        }

        function update() {
            player.setVelocity(0);
            if (cursors.left.isDown) player.setVelocityX(-300);
            else if (cursors.right.isDown) player.setVelocityX(300);
            if (cursors.up.isDown) player.setVelocityY(-300);
            else if (cursors.down.isDown) player.setVelocityY(300);

            this.ring.x = player.x;
            this.ring.y = player.y;

            // Çalı Gizleme Mekaniği
            let inBush = false;
            this.physics.overlap(player, bushes, () => { inBush = true; });
            player.setAlpha(inBush ? 0.4 : 1);
        }
    </script>
</body>
</html>
