<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doruk Stars | Ultimate Game Project</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        #game-container {
            border: 4px solid #f39c12;
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.5);
        }
        /* UI Katmanı */
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            text-shadow: 2px 2px #000;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h2 style="margin:0;">DORUK STARS</h2>
        <p>Can: <span id="hp-text">3600</span> | Süper: %<span id="super-text">0</span></p>
    </div>

    <div id="game-container"></div>

    <script>
        // --- OYUN AYARLARI ---
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false
                }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);
        let player;
        let cursors;
        let bullets;
        let enemies;
        let superMeter = 0;

        function preload() {
            // Asset Loading (Örnek placeholderlar)
            this.load.image('map', 'https://labs.phaser.io/assets/skies/space3.png');
            this.load.image('doruk', 'https://labs.phaser.io/assets/sprites/asmos.png');
            this.load.image('bullet', 'https://labs.phaser.io/assets/sprites/bullets/bullet6.png');
            this.load.image('enemy', 'https://labs.phaser.io/assets/sprites/shmup-ship.png');
        }

        function create() {
            // Arka Plan
            this.add.image(400, 300, 'map').setAlpha(0.5);

            // Oyuncu (Doruk) Oluşturma
            player = this.physics.add.sprite(400, 300, 'doruk');
            player.setCollideWorldBounds(true);
            player.hp = 3600;

            // Mermi Grubu (Object Pooling Mantığı)
            bullets = this.physics.add.group({
                defaultKey: 'bullet',
                maxSize: 10
            });

            // Basit Düşman
            enemies = this.physics.add.group();
            let enemy = enemies.create(600, 300, 'enemy');
            enemy.setTint(0xff0000);

            // Kontroller
            cursors = this.input.keyboard.createCursorKeys();
            this.input.on('pointerdown', shoot, this);

            // Çarpışma Kontrolü
            this.physics.add.overlap(bullets, enemies, hitEnemy, null, this);
        }

        function update() {
            // Hareket Mekaniği
            player.setVelocity(0);

            if (cursors.left.isDown) player.setVelocityX(-300);
            else if (cursors.right.isDown) player.setVelocityX(300);

            if (cursors.up.isDown) player.setVelocityY(-300);
            else if (cursors.down.isDown) player.setVelocityY(300);
        }

        function shoot(pointer) {
            let bullet = bullets.get(player.x, player.y);

            if (bullet) {
                bullet.setActive(true);
                bullet.setVisible(true);
                
                // Mouse koordinatına göre ateş açısı
                this.physics.moveToObject(bullet, pointer, 600);
                
                // Mermi menzili dışına çıkınca temizleme
                this.time.addEvent({
                    delay: 1000,
                    callback: () => { bullet.setActive(false); bullet.setVisible(false); }
                });
            }
        }

        function hitEnemy(bullet, enemy) {
            bullet.setActive(false);
            bullet.setVisible(false);
            bullet.body.stop();

            // Süper Barı Doldurma
            if (superMeter < 100) {
                superMeter += 10;
                document.getElementById('super-text').innerText = superMeter;
                
                if (superMeter >= 100) {
                    document.getElementById('super-text').style.color = "yellow";
                    document.getElementById('super-text').innerText = "HAZIR!";
                }
            }
            
            // Düşman tepkisi (Geri tepme)
            enemy.setX(enemy.x + 20);
            this.cameras.main.shake(100, 0.01);
        }
    </script>
</body>
</html>
