<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doruk Stars | Pro Project</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser3-rex-plugins@1.1.39/dist/rexvirtualjoystickplugin.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial', sans-serif; user-select: none; }
        
        /* --- ÜST BAR (Görseldeki gibi ince ve şık) --- */
        #top-bar {
            position: absolute; top: 0; left: 0; width: 100%; height: 50px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; box-sizing: border-box; z-index: 150;
            border-bottom: 2px solid #f39c12; background: rgba(0,0,0,0.7);
        }
        .stat-box { display: flex; align-items: center; gap: 10px; }
        .stat-item { background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 15px; border: 1px solid #f39c12; color: white; font-weight: bold; font-size: 14px; }

        /* --- LOBİ (Yıldızlı Arka Plan) --- */
        #lobby-ui {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at bottom, #000033 0%, #000 100%);
            z-index: 100; transition: 0.5s;
        }
        /* Yıldız Efekti */
        .stars { position: absolute; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/stardust.png'); opacity: 0.5; }

        /* --- MENÜ BUTONLARI --- */
        .side-btn { position: absolute; width: 80px; height: 60px; border-radius: 12px; border: 2px solid #555; color: white; font-size: 10px; font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; text-align: center; text-transform: uppercase; }
        .doruk-pass { top: 80px; left: 20px; background: linear-gradient(#8e44ad, #2980b9); box-shadow: 0 0 15px #8e44ad; border-color: #fff; }
        .dukkan-btn { top: 160px; left: 20px; background: #34495e; }
        .savasci-btn { top: 80px; right: 20px; background: #34495e; }

        /* --- OYNA BUTONU (Alt Orta) --- */
        #play-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); text-align: center; }
        .main-play-btn { background: #f1c40f; border: 4px solid #d35400; color: black; font-size: 28px; padding: 15px 70px; border-radius: 15px; font-weight: 900; cursor: pointer; box-shadow: 0 5px 0 #95a5a6; }

        /* --- OYUN İÇİ BUTONLAR (Senin ekranındaki dizilim) --- */
        #game-controls { position: absolute; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 200; }
        .control-btn { position: absolute; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; cursor: pointer; pointer-events: auto; border: 3px solid rgba(0,0,0,0.5); }
        .btn-vurus { right: 30px; bottom: 30px; width: 100px; height: 100px; background: #e74c3c; font-size: 18px; }
        .btn-ulti { right: 140px; bottom: 40px; width: 85px; height: 85px; background: #f1c40f; color: black; font-size: 16px; }
        .btn-hiper { right: 235px; bottom: 70px; width: 70px; height: 70px; background: #9b59b6; font-size: 14px; }
    </style>
</head>
<body>

    <div id="top-bar">
        <div class="stat-box"><div class="stat-item" style="color:#f39c12">🏆 36757</div></div>
        <div style="color:white; font-weight:bold; letter-spacing: 1px;">SK | DSFXTR</div>
        <div class="stat-box">
            <div class="stat-item" style="color:#f1c40f">🟡 14389</div>
            <div class="stat-item" style="color:#3498db">💎 116</div>
        </div>
    </div>

    <div id="lobby-ui">
        <div class="stars"></div>
        
        <div class="side-btn doruk-pass">DORUK<br>PASS</div>
        <div class="side-btn dukkan-btn">🛒<br>Dükkan</div>
        <div class="side-btn savasci-btn">🥋<br>Savaşçılar</div>

        <div id="play-container">
            <div class="main-play-btn" onclick="startGame()">OYNA</div>
        </div>
    </div>

    <div id="game-controls">
        <div class="control-btn btn-vurus">VURUŞ</div>
        <div class="control-btn btn-ulti">ULTİ</div>
        <div class="control-btn btn-hiper">HİPER</div>
    </div>

    <div id="phaser-app"></div>

    <script>
        function startGame() {
            document.getElementById('lobby-ui').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('lobby-ui').style.display = 'none';
                document.getElementById('game-controls').style.display = 'block';
                // Phaser sahnesini başlatma buraya gelecek
            }, 500);
        }

        // Joystick ve Phaser ayarları önceki kodunla aynı mantıkta devam edecek
        // Sadece görsel dizilimi senin attığın görsellere göre 1:1 ayarladım.
    </script>
</body>
</html>
