<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doruk Stars | Pro Game Project</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser3-rex-plugins@1.1.39/dist/rexvirtualjoystickplugin.min.js"></script>
    <style>
        body { margin: 0; background: #0b0d17; overflow: hidden; font-family: 'Arial Black', sans-serif; user-select: none; touch-action: none; }
        
        /* --- LOBİ ARAYÜZÜ --- */
        #lobby-ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://labs.phaser.io/assets/skies/space3.png') center/cover;
            z-index: 100; display: flex; flex-direction: column; justify-content: space-between;
        }
        #top-bar {
            width: 100%; height: 60px; background: rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; box-sizing: border-box; border-bottom: 3px solid #f39c12;
        }
        .stat { background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; border: 2px solid #f39c12; font-weight: bold; color: white; }

        /* BUTONLAR */
        .side-menu { position: absolute; top: 100px; display: flex; flex-direction: column; gap: 15px; }
        .left-menu { left: 20px; } .right-menu { right: 20px; }
        .btn-icon { width: 70px; height: 70px; background: #34495e; border: 3px solid #2c3e50; border-radius: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: bold; text-align: center; }
        .btn-pass { background: #8e44ad; border-color: #9b59b6; box-shadow: 0 0 15px #8e44ad; }

        #bottom-bar { width: 100%; display: flex; justify-content: center; gap: 20px; padding-bottom: 30px; align-items: flex-end; }
        .play-btn { background: #f1c40f; border: 5px solid #d35400; color: black; font-size: 32px; padding: 20px 80px; border-radius: 15px; cursor: pointer; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* PENCERELER (DÜKKAN & SAVAŞÇILAR) */
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; height: 75%; background: #1a1c2c; border: 5px solid #f39c12; border-radius: 25px; color: white; padding: 25px; display: none; z-index: 200; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #2c3e50; border-radius: 12px; padding: 15px; text-align: center; border-bottom: 6px solid #000; cursor: pointer; }
        .card img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #f1c40f; margin-bottom: 10px; }

        /* KUTU AÇILIMI */
        #box-opening { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:500; display:none; flex-direction:column; justify-content:center; align-items:center; }
        #reward-text { font-size: 40px; color: #f1c40f; text-shadow: 0 0 20px #f1c40f; margin-top: 20px; display:none; }

        /* OYUN İÇİ MOBİL KONTROLLER */
        #game-ui { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:50; display:none; }
        .joystick-container { position: absolute; bottom: 40px; left: 40px; width: 150px; height: 150px; pointer-events: auto; }
        .action-btns { position: absolute; bottom: 40px; right: 40px; display: flex; gap: 20px; align-items: flex-end; pointer-events: auto; }
        .action-btn { width: 90px; height: 90px; border-radius: 50%; border: 4px solid rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; color: white; font-size: 14px; }
        .attack { background: #e74c3c; width: 100px; height: 100px; }
        .super { background: #f1c40f; color: black; margin-bottom: 20px; }
        .hyper { background: #9b59b6; width: 70px; height: 70px; margin-bottom: 60px; }
    </style>
</head>
<body>

    <div id="lobby-ui">
        <div id="top-bar">
            <div class="stat" style="color:#e67e22">🏆 36757</div>
            <div style="font-size: 24px; text-shadow: 2px 2px #000; color:white;">SK | DSFXTR</div>
            <div style="display:flex; gap:10px;">
                <div class="stat" style="color:#f1c40f">🟡 14389</div>
                <div class="stat" style="color:#2ecc71">💎 116</div>
            </div>
        </div>

        <div class="side-menu left-menu">
            <div class="btn-icon btn-pass" onclick="alert('Doruk Pass Alındı!')">DORUK<br>PASS</div>
            <div class="btn-icon" onclick="toggleMenu('shop')">🛒<br>Dükkan</div>
        </div>

        <div class="side-menu right-menu">
            <div class="btn-icon" onclick="toggleMenu('brawlers')">🥋<br>Savaşçılar</div>
        </div>

        <div id="bottom-bar">
            <div class="play-btn" onclick="startMatch()">OYNA</div>
        </div>
    </div>

    <div id="shop" class="overlay">
        <h2 style="color:#f1c40f">MAĞAZA</h2>
        <div class="grid">
            <div class="card" onclick="openBox('MEGA KUTU')"><p>MEGA KUTU</p><p>🎁 AL</p></div>
            <div class="card" onclick="openBox('STAR HEDİYESİ')"><p>STAR HEDİYESİ</p><p>ÜCRETSİZ</p></div>
        </div>
        <button onclick="toggleMenu('shop')" style="margin-top:20px; padding:10px 30px;">Kapat</button>
    </div>

    <div id="brawlers" class="overlay">
        <h2 style="color:#f1c40f">SAVAŞÇILAR (100/100)</h2>
        <div class="grid" id="brawler-list"></div>
        <button onclick="toggleMenu('brawlers')" style="margin-top:20px; padding:10px 30px;">Kapat</button>
    </div>

    <div id="box-opening" onclick="closeBox()">
        <h1 id="box-title" style="color:white;">KUTU AÇILIYOR...</h1>
        <div id="reward-text"></div>
        <p style="color:#aaa; margin-top:40px;">(Devam etmek için dokun)</p>
    </div>

    <div id="game-ui">
        <div class="action-btns">
            <div class="action-btn hyper" id="btn-hyper">HİPER</div>
            <div class="action-btn super" id="btn-super">ULTİ</div>
            <div class="action-btn attack" id="btn-attack">VURUŞ</div>
        </div>
    </div>
    <div id="game-container"></div>

    <script>
        // --- ARAYÜZ SİSTEMLERİ ---
        function toggleMenu(id) {
            let el = document.getElementById(id);
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }

        function openBox(title) {
            document.getElementById('shop').style.display = 'none';
            document.getElementById('box-opening').style.display = 'flex';
            document.getElementById('box-title').innerText = title + " AÇILIYOR...";
            setTimeout(() => {
                document.getElementById('reward-text').style.display = 'block';
                document.getElementById('reward-text').innerText = "YENİ SAVAŞÇI: KENJI!";
            }, 1000);
        }

        function closeBox() { 
            document.getElementById('box-opening').style.display = 'none'; 
            document.getElementById('reward-text').style.display = 'none';
        }

        // Savaşçı Listesi (Wikipedia Karakterleri Temsili)
        const names = ["Kenji", "Otis", "Mortis", "Edgar", "Shelly", "Colt", "Leon", "Crow", "Surge", "Kit"];
        const bList = document.getElementById('brawler-list');
        names.forEach(name => {
            bList.innerHTML += `<div class="card">
                <img src="https://robohash.org/${name}?set=set5" alt="${name}">
                <h3>${name}</h3><p>GÜÇ 11</p>
            </div>`;
        });

        function startMatch() {
            document.getElementById('lobby-ui').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            game.scene.resume('MainScene');
        }

        // --- PHASER 3 OYUN MOTORU ---
        class MainScene extends Phaser.Scene {
            constructor() { super('MainScene'); }

            preload() {
                this.load.scenePlugin('rexvirtualjoystickplugin', 'https://cdn.jsdelivr.net/npm/phaser3-rex-plugins@1.1.39/dist/rexvirtualjoystickplugin.min.js', true, 'rexVirtualJoystick');
                this.load.image('ground', 'https://labs.phaser.io/assets/tests/cols/green-tile.png');
                this.load.image('player', 'https://labs.phaser.io/assets/sprites/asmos.png');
                this.load.image('enemy', 'https://labs.phaser.io/assets/sprites/shmup-ship.png');
                this.load.image('bullet', 'https://labs.phaser.io/assets/sprites/bullets/bullet6.png');
            }

            create() {
                this.physics.world.setBounds(0, 0, 2000, 2000);
                this.add.tileSprite(0, 0, 4000, 4000, 'ground').setOrigin(0).setTint(0x1a5e3a);

                this.player = this.physics.add.sprite(1000, 1000, 'player');
                this.player.setCollideWorldBounds(true);
                this.cameras.main.startFollow(this.player);

                this.bullets = this.physics.add.group({ defaultKey: 'bullet', maxSize: 20 });
                this.enemies = this.physics.add.group();
                
                // 9 Bot Rakip
                for(let i=0; i<9; i++) {
                    let enemy = this.enemies.create(Phaser.Math.Between(200, 1800), Phaser.Math.Between(200, 1800), 'enemy').setTint(0xe74c3c);
                    enemy.hp = 3;
                }

                // MOBİL JOYSTICK
                this.joyStick = this.rexVirtualJoystick.add(this, {
                    x: 120, y: window.innerHeight - 120, radius: 60,
                    base: this.add.circle(0, 0, 60, 0x888888, 0.5),
                    thumb: this.add.circle(0, 0, 30, 0xcccccc, 0.8)
                });

                // BUTON OLAYLARI
                document.getElementById('btn-attack').addEventListener('pointerdown', () => this.fire(false));
                document.getElementById('btn-super').addEventListener('pointerdown', () => this.fire(true));
                document.getElementById('btn-hyper').addEventListener('pointerdown', () => {
                    this.player.setTint(0x9b59b6);
                    this.time.delayedCall(5000, () => this.player.clearTint());
                });

                this.physics.add.overlap(this.bullets, this.enemies, (b, e) => {
                    b.destroy(); e.hp--;
                    if(e.hp <= 0) e.destroy();
                });

                this.scene.pause();
            }

            fire(isSuper) {
                let bullet = this.bullets.get(this.player.x, this.player.y);
                if (bullet) {
                    bullet.setActive(true).setVisible(true);
                    if(isSuper) { bullet.setScale(2).setTint(0xf1c40f); }
                    
                    let angle = this.joyStick.angle;
                    if(this.joyStick.force === 0) {
                        let target = this.physics.closest(this.player, this.enemies.getChildren());
                        if(target) angle = Phaser.Math.RadToDeg(Phaser.Math.Angle.Between(this.player.x, this.player.y, target.x, target.y));
                    }
                    this.physics.velocityFromAngle(angle, 700, bullet.body.velocity);
                }
            }

            update() {
                this.player.setVelocity(0);
                if (this.joyStick.force > 0) {
                    this.physics.velocityFromAngle(this.joyStick.angle, 300, this.player.body.velocity);
                }
            }
        }

        const config = {
            type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight,
            parent: 'game-container', physics: { default: 'arcade' },
            scene: MainScene
        };
        const game = new Phaser.Game(config);
    </script>
</body>
</html>
